<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7429448267352051"
     crossorigin="anonymous"></script>
     
<title>ハートピア用ドット変換ツール</title>
<style>
body {
  font-family: sans-serif;
  padding: 20px;
  box-sizing: border-box;
}

canvas {
  image-rendering: pixelated;
  border: 1px solid #999;
}

.controls {
  margin-bottom: 10px;
}

.right {
  width: 340px;
}

.palette {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.palette-group {
  display: grid;
  grid-template-columns: repeat(2, 20px);
  gap: 2px;
  border: 1px solid #aaa;
  padding: 4px;
}

.color-cell {
  width: 20px;
  height: 20px;
}

.highlight {
  outline: 3px solid red;
}

.info {
  margin-bottom: 10px;
  white-space: pre-line;
}

#canvasWrap {
  position: relative;
  display: inline-block;
  --cell: 12px;
  --grid-black: rgba(0,0,0,0.3);
  --grid-white: rgba(255,255,255,0.4);
  --grid-color: var(--grid-black);
}

#maskCanvas {
  position: absolute;
  top: 0;
  left: 0;
  pointer-events: none;
  image-rendering: pixelated;
}

.grid.thin {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
    linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
  background-size: var(--cell) var(--cell);
}

.grid.major {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(to right, transparent 0, transparent calc(var(--cell) * 5 - 1px), var(--grid-color) calc(var(--cell) * 5 - 1px), var(--grid-color) calc(var(--cell) * 5 + 1px), transparent calc(var(--cell) * 5 + 1px)),
    linear-gradient(to bottom, transparent 0, transparent calc(var(--cell) * 5 - 1px), var(--grid-color) calc(var(--cell) * 5 - 1px), var(--grid-color) calc(var(--cell) * 5 + 1px), transparent calc(var(--cell) * 5 + 1px));
  background-size: calc(var(--cell) * 5) calc(100% + 1px), calc(100% + 1px) calc(var(--cell) * 5);
}

#selectionLayer {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.select-rect {
  position: absolute;
  border: 1px solid red;
  box-sizing: border-box;
}

#tooltip {
  position: absolute;
  padding: 6px 10px;
  background: #fff;
  color: #333;
  font-size: 12px;
  border-radius: 6px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
}

#tooltip.show { opacity: 1; }

.gauge-box {
  background: #f0f0f0;
  padding: 10px;
  border-radius: 8px;
  display: inline-block;
  margin-top: 10px;
}
</style>
</head>
<body>

<div class="tool-desc">
  <h2>ハートピア専用ドット絵変換ツール</h2>
</div>

<div class="controls">
  比率：<select id="ratio"><option value="1:1">1:1</option><option value="16:9">16:9</option><option value="4:3">4:3</option><option value="3:4">3:4</option><option value="9:16">9:16</option></select>
  精度：<select id="resolution"><option value="30">30</option><option value="50" selected>50</option><option value="100">100</option><option value="150">150</option></select>
  <br><br>
  <input type="file" id="imageInput">
  <br><br>
  ズーム：<input type="range" id="zoom" min="4" max="25" value="12">
</div>

<div class="gauge-box">
  背景を白く：<input type="range" id="whiteGauge" min="0" max="100" value="0">
  <br>
  背景を黒く：<input type="range" id="blackGauge" min="0" max="100" value="0">
</div>

<br><br>
グリッド：<button id="gridToggle">ON</button> <button id="gridColorToggle">黒</button>
強調表示：<button id="editToggle">OFF</button>

<br><br>
<div id="canvasWrap">
  <canvas id="canvas"></canvas>
  <canvas id="maskCanvas"></canvas>
  <div class="grid thin"></div>
  <div class="grid major"></div>
  <div id="selectionLayer"></div>
  <div id="tooltip"></div>
</div>

<br><br>
<button id="downloadBtn">ダウンロード</button>

<div class="right">
  <div class="info" id="info">ドットをタップしてください</div>
  <div class="palette" id="palette"></div>
</div>

<script>
const gridSizeTable = { "16:9": { 30: { w: 30, h: 18 }, 50: { w: 50, h: 28 }, 100:{ w:100, h: 56 }, 150:{ w:150, h: 84 } }, "4:3": { 30: { w: 30, h: 24 }, 50: { w: 50, h: 38 }, 100:{ w:100, h: 76 }, 150:{ w:150, h:114 } }, "1:1": { 30: { w: 30, h: 30 }, 50: { w: 50, h: 50 }, 100:{ w:100, h:100 }, 150:{ w:150, h:150 } }, "3:4": { 30: { w: 24, h: 30 }, 50: { w: 38, h: 50 }, 100:{ w: 76, h:100 }, 150:{ w:114, h:150 } }, "9:16": { 30: { w: 18, h: 30 }, 50: { w: 28, h: 50 }, 100:{ w: 56, h:100 }, 150:{ w: 84, h:150 } } };
const palettes = [ { name:"黒系", columns:[["#061616","#808182","#fefffe"],["#434446","#bec0bf","#fefbf4"]]}, { name:"赤系", columns:[["#d2374f","#a7273e","#cb8384","#69313b","#c0acab"],["#ef6e72","#f5aca6","#a25e5f","#e7d6d6","#745f5e"]]}, { name:"オレンジ系", columns:[["#e95e2c","#aa4225","#da947d","#753b32","#bfaca6"],["#fa8359","#feba9f","#ae6b58","#e9d6d0","#755d59"]]}, { name:"山吹系", columns:[["#f39d12","#b16d18","#dba76d","#7a5026","#cebca8"],["#feae3b","#ffcf91","#b3814c","#f5e3cf","#806f5f"]]}, { name:"黄色系", columns:[["#eeca15","#b39417","#d3be6d","#756227","#c6bfa3"],["#f9d737","#fce891","#ab964a","#efe6c6","#78725a"]]}, { name:"黄緑系", columns:[["#a7bc15","#758616","#adb76e","#555f2b","#bbc0a2"],["#b6c930","#d8de92","#848f48","#e5eac6","#6f745e"]]}, { name:"緑系", columns:[["#06a15d","#047245","#78b28c","#235740","#9eb6a6"],["#41b97c","#9cd9ad","#508969","#c4dfcc","#53695d"]]}, { name:"エメラルド系", columns:[["#058681","#056865","#57a49e","#054b4b","#98b7b2"],["#05ab9f","#7cccbf","#2c7d77","#bfdfda","#4d6a66"]]}, { name:"水色系", columns:[["#06719d","#055877","#5192a4","#064959","#9db4ba"],["#059aba","#78baca","#246d7e","#c6dde2","#50676f"]]}, { name:"青系", columns:[["#065ea6","#054781","#5d80a0","#193b57","#9ca6b0"],["#2d83c0","#84a8c8","#385c80","#c0cdd6","#4b5a67"]]}, { name:"青紫系", columns:[["#524da1","#3e397d","#787aa1","#313453","#a0a2af"],["#7578bd","#a2a0c8","#55577e","#c9cbd7","#575969"]]}, { name:"赤紫系", columns:[["#813c8c","#622a6c","#907296","#432f4b","#aba1ac"],["#9f67ab","#b89bb9","#6b4d73","#d0c8d3","#615664"]]}, { name:"桃系", columns:[["#ac356d","#872757","#b37a8b","#60344b","#bdadb0"],["#d06a8f","#daa1b4","#8c5268","#e2d6da","#725e67"]]} ];

let editMode = false;
let selectedColor = null;
let sourceImage = null;
let grid = [];
let lastX = -1, lastY = -1;
let paletteCells = [];

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const maskCanvas = document.getElementById("maskCanvas");
const mctx = maskCanvas.getContext("2d");
const zoom = document.getElementById("zoom");
const selectionLayer = document.getElementById("selectionLayer");
const whiteGauge = document.getElementById("whiteGauge");
const blackGauge = document.getElementById("blackGauge");
const info = document.getElementById("info");
const tooltip = document.getElementById("tooltip");

function buildPaletteUI() {
  const pDiv = document.getElementById("palette");
  pDiv.innerHTML = "";
  paletteCells = [];
  palettes.forEach((p, pi) => {
    const g = document.createElement("div"); g.className = "palette-group";
    const rows = p.columns[0].length;
    for (let ri = 0; ri < rows; ri++) {
      p.columns.forEach((col, ci) => {
        const cell = document.createElement("div");
        cell.className = "color-cell"; cell.style.background = col[ri];
        cell.dataset.pi = pi; cell.dataset.ci = ci; cell.dataset.ri = ri;
        g.appendChild(cell);
        paletteCells.push(cell);
      });
    }
    pDiv.appendChild(g);
  });
}
buildPaletteUI();

function updateMask() {
  const { w, h } = gridSizeTable[document.getElementById("ratio").value][document.getElementById("resolution").value];
  mctx.clearRect(0, 0, w, h);
  const wVal = whiteGauge.value / 100;
  const bVal = blackGauge.value / 100;
  if ((wVal === 0 && bVal === 0) || !selectedColor) return;
  mctx.fillStyle = wVal > 0 ? `rgba(255,255,255,${wVal})` : `rgba(0,0,0,${bVal})`;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (grid[y][x].color !== selectedColor) mctx.fillRect(x, y, 1, 1);
    }
  }
}

function updateSelection() {
  selectionLayer.innerHTML = "";
  if (!selectedColor || !grid.length) return;
  const cellSize = parseFloat(zoom.value);
  for (let y = 0; y < grid.length; y++) {
    for (let x = 0; x < grid[y].length; x++) {
      if (grid[y][x].color === selectedColor) {
        if (!editMode && (x !== lastX || y !== lastY)) continue;
        const rect = document.createElement("div");
        rect.className = "select-rect";
        rect.style.cssText = `left:${x*cellSize}px; top:${y*cellSize}px; width:${cellSize}px; height:${cellSize}px;`;
        selectionLayer.appendChild(rect);
      }
    }
  }
}

canvas.onclick = e => {
  if (!grid.length) return;
  const r = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX-r.left)/(r.width/canvas.width));
  const y = Math.floor((e.clientY-r.top)/(r.height/canvas.height));
  if (!grid[y] || !grid[y][x]) return;
  const c = grid[y][x];
  selectedColor = c.color; lastX = x; lastY = y;

  updateSelection();
  updateMask();

  info.innerText = `このマスの色：\n左から ${c.pi+1} 番パレット\n${c.ci+1} 列目 の 上から ${c.ri+1} 番`;

  paletteCells.forEach(p=>p.classList.remove("highlight"));
  paletteCells.find(p => p.dataset.pi==c.pi && p.dataset.ci==c.ci && p.dataset.ri==c.ri)?.classList.add("highlight");

  tooltip.innerText = `P${c.pi+1} / 列${c.ci+1} / 行${c.ri+1}`;
  tooltip.style.left = e.clientX - r.left + 12 + "px";
  tooltip.style.top  = e.clientY - r.top  + 12 + "px";
  tooltip.classList.add("show");
  clearTimeout(tooltip._timer);
  tooltip._timer = setTimeout(() => tooltip.classList.remove("show"), 5000);
};

whiteGauge.oninput = () => { blackGauge.value = 0; updateMask(); };
blackGauge.oninput = () => { whiteGauge.value = 0; updateMask(); };

function renderFromSource() {
  if (!sourceImage) return;
  const { w, h } = gridSizeTable[document.getElementById("ratio").value][document.getElementById("resolution").value];
  canvas.width = maskCanvas.width = w; 
  canvas.height = maskCanvas.height = h;
  const z = zoom.value;
  canvas.style.width = maskCanvas.style.width = (w * z) + "px";
  canvas.style.height = maskCanvas.style.height = (h * z) + "px";
  const wrap = document.getElementById("canvasWrap");
  wrap.style.width = (w * z) + "px";
  wrap.style.height = (h * z) + "px";
  wrap.style.setProperty("--cell", z + "px");

  const temp = document.createElement("canvas");
  temp.width = w; temp.height = h;
  const tctx = temp.getContext("2d");
  tctx.drawImage(sourceImage, 0, 0, w, h);
  const data = tctx.getImageData(0,0,w,h).data;
  grid = [];
  for (let y = 0; y < h; y++) {
    grid[y] = [];
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      const hex = `#${[data[i], data[i+1], data[i+2]].map(v => v.toString(16).padStart(2,"0")).join("")}`;
      const best = findNearest(hex);
      grid[y][x] = best;
      ctx.fillStyle = best.color;
      ctx.fillRect(x, y, 1, 1);
    }
  }
  updateMask();
  updateSelection();
}

function findNearest(hex) {
  let best = null, minD = Infinity;
  const r1 = parseInt(hex.slice(1,3),16), g1 = parseInt(hex.slice(3,5),16), b1 = parseInt(hex.slice(5,7),16);
  palettes.forEach((p, pi) => p.columns.forEach((col, ci) => col.forEach((c, ri) => {
    const r2 = parseInt(c.slice(1,3),16), g2 = parseInt(c.slice(3,5),16), b2 = parseInt(c.slice(5,7),16);
    const d = (r1-r2)**2 + (g1-g2)**2 + (b1-b2)**2;
    if (d < minD) { minD = d; best = {pi, ci, ri, color: c}; }
  })));
  return best;
}

document.getElementById("imageInput").onchange = e => {
  const img = new Image();
  img.onload = () => { sourceImage = img; renderFromSource(); };
  img.src = URL.createObjectURL(e.target.files[0]);
};

zoom.oninput = renderFromSource;
document.getElementById("ratio").onchange = renderFromSource;
document.getElementById("resolution").onchange = renderFromSource;

document.getElementById("editToggle").onclick = function() {
  editMode = !editMode; this.textContent = editMode ? "ON" : "OFF"; updateSelection();
};

document.getElementById("gridToggle").onclick = function() {
  const wrap = document.getElementById("canvasWrap");
  const isOff = this.textContent === "ON";
  const colorBtnText = document.getElementById("gridColorToggle").textContent;
  wrap.style.setProperty("--grid-color", isOff ? "transparent" : (colorBtnText === "白" ? "rgba(255,255,255,0.4)" : "rgba(0,0,0,0.3)"));
  this.textContent = isOff ? "OFF" : "ON";
};

document.getElementById("gridColorToggle").onclick = function() {
  const isWhite = this.textContent === "黒";
  this.textContent = isWhite ? "白" : "黒";
  if(document.getElementById("gridToggle").textContent === "ON") {
    document.getElementById("canvasWrap").style.setProperty("--grid-color", isWhite ? "rgba(255,255,255,0.4)" : "rgba(0,0,0,0.3)");
  }
};

document.getElementById("downloadBtn").onclick = () => {
  const link = document.createElement("a");
  link.download = "dot_art.png"; link.href = canvas.toDataURL(); link.click();
};
</script>
</body>
</html>
